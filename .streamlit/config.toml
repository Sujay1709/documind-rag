# Streamlit theme & server configuration for DocuMind.
# Warm, deep "toasted-tan" (light) theme.

[theme]
base = "light"
primaryColor = "#8A5A33"            # deeper mocha
backgroundColor = "#CDBC97"         # toasted tan (darker than the old beige)
secondaryBackgroundColor = "#E7DCC4" # lighter cream so cards/inputs pop on the darker page
textColor = "#2A2620"               # dark espresso
font = "serif"

[browser]
gatherUsageStats = false

[server]
headless = true
# Maximum upload size per file, in megabytes (default is 200).
maxUploadSize = 500
# Stability: don't watch files for changes or auto-rerun (avoids the
# "connection lost" / reload churn that interrupts a session).
fileWatcherType = "none"
runOnSave = false
